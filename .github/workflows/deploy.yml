name: Deploy to Hostinger

on:
  push:
    branches:
      - main

# Jangan biarkan beberapa deploy jalan bertumpuk — batalkan yang lama.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          HOST: ${{ secrets.FTP_SERVER }}
          USER: ${{ secrets.FTP_USERNAME }}
          PASS: ${{ secrets.FTP_PASSWORD }}
          DIR:  ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set net:timeout 20
            set net:max-retries 5
            set net:reconnect-interval-base 5
            set net:reconnect-interval-multiplier 1
            set net:persist-retries 5
            set mirror:parallel-transfer-count 2
            open -u \"$USER\",\"$PASS\" sftp://$HOST
            mirror --reverse --verbose --ignore-time --no-perms --continue \
              --exclude-glob .git \
              --exclude-glob .github \
              --exclude-glob node_modules \
              --exclude-glob .env \
              . \"$DIR\"
            quit
          "
